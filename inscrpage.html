<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Inscription</title>
</head>
<body class="inscrpage">
    <!--
    
    -----NAVBAR-----
    
    -->
    <header>
        <img src="image/League-of-Legends-Logo.png" class="logo">
        <div class="navbar">
            <ul>
                <li><a href="/index.html">Accueil 🔽</a></li>
                <li><a href="#">Skins 🔽</a>
                    <ul>
                        <a href="#"><li>Boutique</li></a>
                        <a href="#"><li>Saisons</li></a>
                        <a href="#"><li>Promotions</li></a>
                    </ul>
                </li>
                <li><a href="#">Contact  🔽</a>
                    <ul>
                        <a href="#"><li>Nous Contacter</li></a>
                        <a href="#"><li>Support Technique</li></a>
                        <a href="#"><li>FAQ</li></a>
                        <a href="#"><li>Partenariats</li></a>
                    </ul>
                </li>
                <a href="https://www.leagueoflegends.com/fr-fr/"><li>LOL</li></a>
            </ul>
            <div class="log">
                    <div class="icolog"><input type="image" src="/image/connexion.png" alt="icone connexion" width="20px">
                    <fieldset id="F2">
                        <div>
                            <label for="email">Adresse e-mail</label>
                            <input type="email" name="e_mail" id="email" placeholder="mnt.g@univ-nantes.fr" required>
                        </div>
                        <div>
                            <label for="mdp">Mot de passe</label>
                            <input type="password" name="mdp" id="mdp" placeholder="Password" required>
                        </div><br>
                        <div class="button">
                            <input id="sc" type="submit" value="Se connecter">
                            <p>ou</p>
                            <a href="/inscrpage.html"><input id="cc" type="submit" value="Créer un compte"></a>
                        </div>
                    </fieldset>
                </div>
                    <div class="icobuy"><img src="/image/sac-de-courses.png" alt="icone panier" width="20px"></div>
            </div>
            </div>
            <input type="text" class="search" placeholder="Rechercher">
        </div>
    </header>
    <!--
    
    -----FORM-----
    
    -->
    <h2>Creer un compte</h2>
    <fieldset id="F1">
        <div>
            <label for="prenom">Prénom</label><br>
            <input type="text" name="prenom" id="prenom" placeholder="Gilbert" required>
    
        </div>
        <div>
            <label for="nom">Nom</label><br>
            <input type="text" name="nom" id="nom" placeholder="Montagné" required>
        </div>
        <div>
            <label for="date">Date de naissance</label><br>
            <input type="date" name="date_de_naissance" id="date" max="2011-01-01" required>
        </div>
        <div>
            <label for="email">Adresse e-mail</label><br>
            <input type="email" name="e_mail" id="email" placeholder="mnt.g@univ-nantes.fr" required>
        </div>
        <div>
            <label for="mdp">Mot de passe</label><br>
            <input type="password" name="mdp" id="mdp" placeholder="Password" required>
        </div>   
        <div>
            <label for="mdpc">Confirmation</label><br>
            <input type="password" name="mdp" id="mdpc" placeholder="Password" required>
        </div><br>
        <div>
            <input class="submit" type="submit" value="S'inscrire">
        </div>
    </fieldset>   
</body>
</html>
